global:
  timezone: Asia/Shanghai
  interval: 100
  deduplicate: true
  keep_days: 7

frequency_words:
  - 货拉拉

sources:
  - id: baidu
    name: 百度新闻
    url: "https://news.baidu.com/ns?word=货拉拉&tn=news&from=news&cl=2&rn=20&ct=1"
    type: html
    enabled: true
    rules:
      list: ".result-op"
      title: ".c-title a"
      link: ".c-title a@href"
      time: ".c-author"

notifications:
  email:
    enabled: true
    title: "货拉拉监控"
    template: "内容"
